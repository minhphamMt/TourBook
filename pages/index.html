<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Horizon | Trang chủ</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/home.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main>
      <div id="home-hero" class="section"></div>
      <section class="section">
        <div class="container">
          <div id="featured-section"></div>
          <div id="featured-tours" class="tour-grid"></div>
        </div>
      </section>
      <section class="section">
        <div class="container">
          <div id="destination-section"></div>
          <div id="top-destinations" class="destination-grid"></div>
        </div>
      </section>
      <section class="section">
        <div class="container hero-grid">
          <div id="review-highlight"></div>
          <div id="hero-banner-card"></div>
        </div>
      </section>
      <section class="section">
        <div class="container">
          <div id="coupon-strip"></div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <div id="toast-root"></div>
    <script type="module" src="/js/home.js"></script>
  </body>
</html>
