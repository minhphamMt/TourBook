<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Horizon | Chi tiết tour</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/tour-detail.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="page-shell tour-detail-page">
      <section class="section">
        <div class="container">
          <div id="tour-hero"></div>
        </div>
      </section>
      <section class="section tour-detail-section">
        <div class="container tour-detail-layout">
          <div class="tour-detail-main">
            <div id="tour-gallery"></div>
            <div id="tour-overview"></div>
            <div id="tour-itinerary"></div>
            <div id="tour-route"></div>
            <div id="tour-reviews"></div>
          </div>
          <aside class="tour-detail-side">
            <div id="tour-booking"></div>
          </aside>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <div id="toast-root"></div>
    <script type="module" src="/js/tour-detail.js"></script>
  </body>
</html>
